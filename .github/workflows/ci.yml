name: Laravel CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - run: composer install
      - run: cp .env.example .env
      - run: php artisan key:generate
      - run: php artisan test

  docker:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USER }}/laravel-calc .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USER }}/laravel-calc